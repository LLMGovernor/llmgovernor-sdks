name: Publish Python packages to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish (or 'all')"
        required: false
        default: "all"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - llmgovernor
          - llmgovernor-helicone
          - llmgovernor-langfuse
          - llmgovernor-otel
          - llmgovernor-litellm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        working-directory: python/${{ matrix.package }}
        run: python -m build

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: python/${{ matrix.package }}/dist/*

  publish:
    name: Publish ${{ matrix.package }} to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # REQUIRED for PyPI Trusted Publisher (OIDC)
    strategy:
      fail-fast: false
      matrix:
        package:
          - llmgovernor
          - llmgovernor-helicone
          - llmgovernor-langfuse
          - llmgovernor-otel
          - llmgovernor-litellm
    environment:
      name: pypi
      url: https://pypi.org/p/${{ matrix.package }}
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: dist/

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
